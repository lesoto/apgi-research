name: APGI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  APGI_AUDIT_KEY: ${{ secrets.APGI_AUDIT_KEY || 'x' }}
  APGI_OPERATOR_ROLE: operator
  APGI_CONFIG_SECRET_KEY: ${{ secrets.APGI_CONFIG_SECRET_KEY || 'x' }}

jobs:
  # ---------------------------------------------------------------------------
  # Security Scanning (SAST)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit semgrep safety
    - name: Bandit (Python SAST)
      run: bandit -r . -f json -o bandit-results.json || true
    - name: Semgrep (Pattern scanning)
      run: semgrep --config=auto --json --output=semgrep-results.json . || true
    - name: Dependency scan (Safety)
      run: safety check --json --output safety-results.json || true
    - name: Upload security results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: '*-results.json'
        retention-days: 30

  # ---------------------------------------------------------------------------
  # Unit and Integration Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install psutil pytest pytest-xdist
    - name: Run unit tests
      run: pytest tests/ -m "not slow and not integration" -v --tb=short
    - name: Run security tests
      run: pytest tests/test_security_controls.py -v -m security
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Performance Benchmark Gates
  # ---------------------------------------------------------------------------
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest-benchmark
    - name: Run benchmarks
      run: |
        pytest tests/ -m performance --benchmark-only --benchmark-json=benchmark-results.json
    - name: Check performance gates
      run: |
        python << 'EOF'
        import json
        import sys

        with open('benchmark-results.json') as f:
            results = json.load(f)

        # Gates (adjust based on your baseline)
        GATES = {
            'trial_latency_p50_ms': 10.0,    # 50th percentile < 10ms
            'trial_latency_p95_ms': 50.0,    # 95th percentile < 50ms
            'memory_mb_per_trial': 1.0,     # < 1MB per trial
        }

        failures = []
        for bench in results.get('benchmarks', []):
            name = bench.get('name', '')
            stats = bench.get('stats', {})
            mean_time = stats.get('mean', 0) * 1000  # Convert to ms

            # Check gates (simplified - customize per benchmark)
            if 'latency' in name or 'trial' in name:
                if mean_time > GATES['trial_latency_p95_ms']:
                    failures.append(f"{name}: {mean_time:.2f}ms > {GATES['trial_latency_p95_ms']}ms limit")

        if failures:
            print("PERFORMANCE GATE FAILURES:")
            for f in failures:
                print(f"  - {f}")
            sys.exit(1)
        else:
            print("All performance gates passed!")
        EOF
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results.json
        retention-days: 30

  # ---------------------------------------------------------------------------
  # Integration Tests
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Run integration tests
      run: pytest tests/ -m integration -v --tb=short
      timeout-minutes: 30

  # ---------------------------------------------------------------------------
  # Lint and Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy
    - name: Black format check
      run: black --check .
    - name: Ruff linting
      run: ruff check .
    - name: Type check with mypy
      run: mypy apgi_*.py --ignore-missing-imports
