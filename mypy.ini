[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True
disallow_untyped_defs = False
check_untyped_defs = True
follow_imports = normal

# Exclude system site-packages and venv
exclude =
    (?x)(
        \.venv/
        | venv/
        | env/
        | /opt/homebrew/
        | site-packages/
    )

# Ignore errors from external packages
[mypy-sphinx.*]
ignore_errors = True

[mypy-sphinx.ext.*]
ignore_errors = True
