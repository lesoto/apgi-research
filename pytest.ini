[tool:pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-branch
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing
    --cov-fail-under=85
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    security: marks tests as security tests
    performance: marks tests as performance tests
    stress: marks tests as stress tests
    mutation: marks tests for mutation testing
    snapshot: marks tests as snapshot tests
    race_condition: marks tests that check for race conditions
    adversarial: marks tests using adversarial data
    boundary: marks tests for boundary value analysis
    flaky: marks tests that may be flaky
